name: SIFT Release Watch

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:
    inputs:
      ubuntu_version:
        description: "Ubuntu base image version"
        required: true
        default: "24.04"
      cast_version:
        description: "Cast release version without leading v"
        required: true
        default: "1.0.13"
      publish_platforms:
        description: "Comma-separated Docker platforms for publish builds"
        required: true
        default: "linux/amd64,linux/arm64"
      force_rebuild:
        description: "Rebuild even if the SIFT release tag already exists"
        type: boolean
        required: true
        default: false
      publish_dockerhub:
        description: "Also publish to Docker Hub"
        type: boolean
        required: true
        default: false
      dockerhub_image:
        description: "Docker Hub image name, for example xboarder56/sift-workstation"
        required: false
        default: "xboarder56/sift-workstation"

permissions:
  contents: read
  packages: write

concurrency:
  group: sift-release-watch
  cancel-in-progress: false

env:
  GHCR_IMAGE: ghcr.io/xboarder56/sift-workstation
  DOCKERHUB_IMAGE: ${{ github.event.inputs.dockerhub_image || vars.DOCKERHUB_IMAGE || 'xboarder56/sift-workstation' }}
  UBUNTU_VERSION: ${{ github.event.inputs.ubuntu_version || vars.UBUNTU_VERSION || '24.04' }}
  BASE_IMAGE: ubuntu:${{ github.event.inputs.ubuntu_version || vars.UBUNTU_VERSION || '24.04' }}
  CAST_VERSION: ${{ github.event.inputs.cast_version || vars.CAST_VERSION || '1.0.13' }}
  PUBLISH_PLATFORMS: ${{ github.event.inputs.publish_platforms || vars.PUBLISH_PLATFORMS || 'linux/amd64,linux/arm64' }}
  FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
  PUBLISH_DOCKERHUB: ${{ github.event.inputs.publish_dockerhub || vars.PUBLISH_DOCKERHUB || 'false' }}

jobs:
  discover:
    name: Discover latest SIFT release
    runs-on: ubuntu-24.04
    outputs:
      sift_version: ${{ steps.release.outputs.sift_version }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Resolve latest upstream release
        id: release
        shell: bash
        run: |
          set -euo pipefail
          release_json="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/teamdfir/sift-saltstack/releases/latest")"
          sift_version="$(jq -r '.tag_name // empty' <<<"${release_json}")"
          if [[ -z "${sift_version}" || "${sift_version}" == "null" ]]; then
            echo "Unable to resolve latest SIFT release tag" >&2
            exit 1
          fi

          echo "sift_version=${sift_version}" >> "${GITHUB_OUTPUT}"
          echo "Latest upstream SIFT release: ${sift_version}"

      - name: Log in to GHCR for tag check
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub for tag check
        if: env.PUBLISH_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check whether release image already exists
        id: check
        shell: bash
        run: |
          set -euo pipefail
          sift_version="${{ steps.release.outputs.sift_version }}"
          ghcr_tag="${GHCR_IMAGE}:${sift_version}"
          dockerhub_tag="${DOCKERHUB_IMAGE}:${sift_version}"

          if [[ "${FORCE_REBUILD}" == "true" ]]; then
            echo "Force rebuild requested."
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          ghcr_exists=false
          dockerhub_exists=true

          if docker buildx imagetools inspect "${ghcr_tag}" >/dev/null 2>&1; then
            ghcr_exists=true
            echo "GHCR image tag already exists: ${ghcr_tag}"
          else
            echo "GHCR image tag does not exist yet: ${ghcr_tag}"
          fi

          if [[ "${PUBLISH_DOCKERHUB}" == "true" ]]; then
            dockerhub_exists=false
            if docker buildx imagetools inspect "${dockerhub_tag}" >/dev/null 2>&1; then
              dockerhub_exists=true
              echo "Docker Hub image tag already exists: ${dockerhub_tag}"
            else
              echo "Docker Hub image tag does not exist yet: ${dockerhub_tag}"
            fi
          fi

          if [[ "${ghcr_exists}" != "true" || "${dockerhub_exists}" != "true" ]]; then
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          else
            echo "All requested release image tags already exist."
            echo "should_build=false" >> "${GITHUB_OUTPUT}"
          fi

  publish:
    name: Build and publish latest SIFT release
    runs-on: ubuntu-24.04
    needs: discover
    if: needs.discover.outputs.should_build == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.PUBLISH_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          sift_version="${{ needs.discover.outputs.sift_version }}"
          short_sha="${GITHUB_SHA::12}"

          tags=(
            "${GHCR_IMAGE}:latest"
            "${GHCR_IMAGE}:${sift_version}"
            "${GHCR_IMAGE}:sha-${short_sha}"
          )

          if [[ "${PUBLISH_DOCKERHUB}" == "true" ]]; then
            tags+=(
              "${DOCKERHUB_IMAGE}:latest"
              "${DOCKERHUB_IMAGE}:${sift_version}"
              "${DOCKERHUB_IMAGE}:sha-${short_sha}"
            )
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PUBLISH_PLATFORMS }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          sbom: true
          provenance: mode=max
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || '' }}
            GIT_COMMIT=${{ github.sha }}
            IMAGE_VERSION=${{ needs.discover.outputs.sift_version }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
            IMAGE_DOCUMENTATION=${{ github.server_url }}/${{ github.repository }}#readme
            IMAGE_URL=${{ github.server_url }}/${{ github.repository }}
            IMAGE_AUTHORS=${{ github.repository_owner }}
            CAST_VERSION=${{ env.CAST_VERSION }}
            SIFT_VERSION=${{ needs.discover.outputs.sift_version }}
            SIFT_TARGET=sift
            SIFT_MODE=server
            RUN_VALIDATION=true
